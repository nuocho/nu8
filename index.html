<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NU8 - Presentación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root">
        <div style="color: #333; padding: 20px; text-align: center;">Cargando experiencia NU8...</div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [slide, setSlide] = useState(1);

            const content = {
                1: { t: "Núcleo de Producción", h: "Integral.", p: "TU ALIADO OPERATIVO B2B. Entendemos las reglas del juego para operar sin riesgos." },
                2: { t: "Ingeniería 3D", h: "Experiencia.", p: "Capacidad de respuesta industrial con acabados premium. Modelado y manufactura de alta fidelidad." },
                3: { t: "Producción de Marca", h: "BTL.", p: "Ejecución técnica de activaciones. Transformamos renders complejos en realidades tangibles." }
            };

            const active = content[slide];

            return (
                <div className="min-h-screen bg-black flex flex-col justify-between p-8 md:p-16">
                    {/* Header */}
                    <header className="flex justify-between items-center">
                        <div className="flex items-baseline">
                            <span className="text-3xl font-black tracking-tighter text-orange-500 uppercase">nuocho</span>
                            <span className="text-3xl font-light tracking-tighter text-white/90">estudio</span>
                        </div>
                        <div className="text-[10px] font-bold tracking-[0.5em] opacity-20 uppercase">2026</div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-4xl fade-in">
                        <div className="mb-4">
                            <span className="text-[10px] font-black tracking-[0.3em] text-orange-500 border border-orange-500/30 px-3 py-1 rounded-full uppercase bg-orange-500/5">
                                Pipeline Operativo
                            </span>
                        </div>
                        <h1 className="text-6xl md:text-8xl font-black uppercase leading-[0.9] tracking-tighter">
                            <span className="block">{active.t}</span>
                            <span className="text-orange-500">{active.h}</span>
                        </h1>
                        <div className="h-1 w-24 bg-orange-500 my-8"></div>
                        <p className="text-xl text-gray-400 max-w-xl leading-relaxed">
                            {active.p}
                        </p>
                    </main>

                    {/* Footer / Nav */}
                    <footer className="flex flex-col md:flex-row justify-between items-end gap-8">
                        <div className="flex gap-4">
                            {[1, 2, 3].map(num => (
                                <button 
                                    key={num} 
                                    onClick={() => setSlide(num)}
                                    className={`w-12 h-12 rounded-full font-black text-xs transition-all border ${slide === num ? 'bg-orange-500 border-orange-500 text-black' : 'border-zinc-800 text-zinc-500 hover:border-orange-500'}`}
                                >
                                    0{num}
                                </button>
                            ))}
                        </div>
                        <div className="text-right">
                            <p className="text-xs font-black text-orange-500 tracking-widest uppercase mb-1">Contacto Directo</p>
                            <p className="text-sm font-bold">311 535 92 53</p>
                            <p className="text-[10px] opacity-40">direccioncreativa@nuocho.com.co</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
