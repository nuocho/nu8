<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU8 - Presentación B2B</title>
  <style>
    :root{
      --bg:#000;
      --panel:#050505;
      --panel2:#101010;
      --text:#fff;
      --muted:#a1a1aa;
      --line:rgba(255,255,255,.08);
      --orange:#f97316;
      --orange-soft:rgba(249,115,22,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{overflow:hidden}
    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns: 58% 42%;
    }
    .left{
      padding:40px 48px;
      border-right:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:100vh;
    }
    .brand{
      font-size:32px;
      font-weight:900;
      letter-spacing:-1px;
      text-transform:uppercase;
      cursor:pointer;
      user-select:none;
    }
    .brand .orange{color:var(--orange)}
    .tag{
      display:inline-block;
      font-size:10px;
      font-weight:800;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--orange);
      border:1px solid rgba(249,115,22,.25);
      background:var(--orange-soft);
      border-radius:999px;
      padding:8px 14px;
      margin-bottom:24px;
    }
    .hero{
      animation:up .5s ease;
      padding:24px 0;
    }
    @keyframes up{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
    .title{
      font-size:88px;
      line-height:.9;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:-3px;
      margin:0 0 22px;
    }
    .title .orange{color:var(--orange)}
    .bar{
      width:96px;
      height:4px;
      background:var(--orange);
      margin:0 0 24px;
    }
    .bodytext{
      font-size:22px;
      line-height:1.55;
      color:var(--muted);
      max-width:620px;
      margin:0;
    }
    .footer{
      padding-top:20px;
      border-top:1px solid var(--line);
      display:flex;
      flex-wrap:wrap;
      gap:36px;
    }
    .footer a{
      color:#fff;
      text-decoration:none;
    }
    .footer small{
      display:block;
      color:rgba(249,115,22,.55);
      font-size:9px;
      font-weight:800;
      letter-spacing:.25em;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .footer strong{
      font-size:13px;
    }

    .right{
      background:var(--panel);
      padding:28px;
      overflow-y:auto;
      height:100vh;
      position:relative;
    }
    .gallery{
      display:flex;
      flex-direction:column;
      gap:20px;
      padding-bottom:120px;
    }
    .card{
      position:relative;
      width:100%;
      aspect-ratio:16/9;
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      overflow:hidden;
      background:#000;
      cursor:pointer;
      transition:.25s ease;
    }
    .card:hover{
      border-color:var(--orange);
      transform:translateY(-2px);
    }
    .card img,.card video,.placeholder{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .card img{opacity:.55; transition:.25s ease;}
    .card:hover img{opacity:1}
    .placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      background:rgba(249,115,22,.06);
      color:#fff;
      text-align:center;
      padding:20px;
    }
    .play{
      font-size:42px;
      color:var(--orange);
      line-height:1;
      margin-bottom:8px;
    }
    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.15), rgba(0,0,0,.05));
      pointer-events:none;
    }
    .meta{
      position:absolute;
      left:16px;
      bottom:14px;
      z-index:2;
    }
    .meta .cat{
      display:block;
      color:var(--orange);
      font-size:10px;
      font-weight:800;
      letter-spacing:.2em;
      text-transform:uppercase;
      margin-bottom:5px;
    }
    .meta .label{
      display:block;
      color:#fff;
      font-size:12px;
      font-weight:800;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .empty{
      height:70vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.05);
      font-size:220px;
      font-weight:900;
    }

    .nav{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      display:flex;
      gap:8px;
      padding:10px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.82);
      backdrop-filter:blur(10px);
      border-radius:999px;
      z-index:50;
    }
    .nav button{
      width:42px;
      height:42px;
      border-radius:999px;
      border:none;
      background:transparent;
      color:#71717a;
      font-weight:900;
      cursor:pointer;
      transition:.2s ease;
    }
    .nav button:hover{color:#fff}
    .nav button.active{
      background:var(--orange);
      color:#000;
      transform:scale(1.08);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.95);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:100;
    }
    .modal.open{display:flex}
    .modal-box{
      width:min(1100px,100%);
      background:#0a0a0a;
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      padding:16px;
    }
    .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:14px;
    }
    .modal-title{
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
      opacity:.45;
      font-weight:800;
    }
    .close{
      border:none;
      background:transparent;
      color:#fff;
      width:40px;
      height:40px;
      border-radius:999px;
      cursor:pointer;
      font-size:22px;
    }
    .close:hover{
      background:var(--orange);
      color:#000;
    }
    .viewer{
      min-height:320px;
      background:#000;
      border-radius:16px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .viewer img,.viewer video{
      max-width:100%;
      max-height:70vh;
      display:block;
    }

    @media (max-width: 980px){
      body{overflow:auto}
      .app{
        grid-template-columns:1fr;
      }
      .left,.right{
        min-height:auto;
        height:auto;
      }
      .right{
        overflow:visible;
      }
      .title{
        font-size:56px;
      }
      .bodytext{
        font-size:18px;
      }
      .footer{
        gap:20px;
      }
      .nav{
        bottom:14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="left">
      <header>
        <div class="brand" id="goHome"><span class="orange">nuocho</span>estudio</div>
      </header>

      <main class="hero" id="hero"></main>

      <footer class="footer">
        <a href="https://wa.me/573115359253" target="_blank">
          <small>WhatsApp Directo</small>
          <strong>311 535 92 53</strong>
        </a>
        <a href="mailto:direccioncreativa@nuocho.com.co">
          <small>E-mail Corporativo</small>
          <strong>direccioncreativa@nuocho.com.co</strong>
        </a>
      </footer>
    </section>

    <aside class="right">
      <div class="gallery" id="gallery"></div>
    </aside>
  </div>

  <nav class="nav" id="nav"></nav>

  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle"></div>
        <button class="close" id="closeModal">×</button>
      </div>
      <div class="viewer" id="viewer"></div>
    </div>
  </div>

  <script>
    const slides = {
      1: {
        title: "Núcleo de Producción",
        h: "Integral.",
        sub: "ALIADO OPERATIVO B2B",
        body: "El B2B requiere profesionales que entiendan la logística y el riesgo corporativo."
      },
      2: {
        title: "Ingeniería",
        h: "3D.",
        sub: "DIFERENCIAL TÉCNICO",
        body: "Modelado avanzado y manufactura de alta fidelidad para piezas que el mercado no ofrece."
      },
      3: {
        title: "Producción",
        h: "de Marca.",
        sub: "BTL + EXPERIENCIAS",
        body: "Ejecución técnica de activaciones. Transformamos renders complejos en realidades."
      },
      4: {
        title: "Estructura",
        h: "de Precios.",
        sub: "TRANSPARENCIA B2B",
        body: "Costos competitivos basados en volumen. Eliminamos sobrecostos ocultos de agencias."
      },
      5: {
        title: "¿Qué proyecto",
        h: "tienes hoy?",
        sub: "VALIDACIÓN + CIERRE",
        body: "Ruta de ejecución técnica en menos de 24 horas. Listos para materializar su visión."
      }
    };

    const mediaBySlide = {
      2: [
        { id:"v1", type:"video", src:"./3D_ITS.mp4", label:"PROYECTO ITS", cat:"VIDEOS" },
        { id:"v2", type:"video", src:"./3D_MAX.mp4", label:"PROYECTO MAX", cat:"VIDEOS" },
        { id:"r1", type:"image", src:"./3d_sensodyne.jpg", label:"SENSODYNE", cat:"RENDERS" },
        { id:"r2", type:"image", src:"./acabado_pieza.jpg", label:"ACABADO TÉCNICO", cat:"PRODUCCIÓN" }
      ],
      3: [
        { id:"b1", type:"image", src:"./BTL1.JPG", label:"SOMBRILLAS", cat:"BTL" },
        { id:"b2", type:"image", src:"./BTL4.PNG", label:"MARCA ARAUCO", cat:"RETAIL" },
        { id:"sm", type:"image", src:"./SM_trofeos.PNG", label:"TROFEOS", cat:"MERCHANDISING" }
      ]
    };

    let currentSlide = 1;
    let selectedIndex = null;

    const hero = document.getElementById("hero");
    const gallery = document.getElementById("gallery");
    const nav = document.getElementById("nav");
    const modal = document.getElementById("modal");
    const viewer = document.getElementById("viewer");
    const modalTitle = document.getElementById("modalTitle");

    function renderHero(){
      const data = slides[currentSlide];
      hero.innerHTML = `
        <span class="tag">${data.sub}</span>
        <h1 class="title">${data.title}<br><span class="orange">${data.h}</span></h1>
        <div class="bar"></div>
        <p class="bodytext">${data.body}</p>
      `;
    }

    function renderGallery(){
      const items = mediaBySlide[currentSlide] || [];
      if(!items.length){
        gallery.innerHTML = `<div class="empty">${currentSlide}</div>`;
        return;
      }

      gallery.innerHTML = items.map((item, idx) => `
        <div class="card" data-idx="${idx}">
          ${
            item.type === "image"
              ? `<img src="${item.src}" alt="${item.label}" loading="lazy">`
              : `<div class="placeholder"><div class="play">▶</div><div>${item.label}</div></div>`
          }
          <div class="overlay"></div>
          <div class="meta">
            <span class="cat">${item.cat}</span>
            <span class="label">${item.label}</span>
          </div>
        </div>
      `).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
          selectedIndex = Number(card.dataset.idx);
          openModal();
        });
      });
    }

    function renderNav(){
      nav.innerHTML = [1,2,3,4,5].map(n => `
        <button class="${n===currentSlide ? 'active' : ''}" data-slide="${n}">0${n}</button>
      `).join("");

      nav.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          currentSlide = Number(btn.dataset.slide);
          selectedIndex = null;
          renderAll();
        });
      });
    }

    function openModal(){
      const items = mediaBySlide[currentSlide] || [];
      const item = items[selectedIndex];
      if(!item) return;

      modalTitle.textContent = item.label;
      viewer.innerHTML = item.type === "video"
        ? `<video controls autoplay playsinline src="${item.src}"></video>`
        : `<img src="${item.src}" alt="${item.label}">`;

      modal.classList.add("open");
    }

    function closeModal(){
      modal.classList.remove("open");
      viewer.innerHTML = "";
    }

    function renderAll(){
      renderHero();
      renderGallery();
      renderNav();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    document.getElementById("goHome").addEventListener("click", () => {
      currentSlide = 1;
      selectedIndex = null;
      renderAll();
    });

    document.getElementById("closeModal").addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if(e.target === modal) closeModal();
    });

    renderAll();
  </script>
</body>
</html>
