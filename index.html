<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NU8 - Presentación B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .animate-entrance { animation: entrance 0.8s ease-out forwards; }
        @keyframes entrance { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const { 
            Settings, Layers, Zap, Clock, ShieldCheck, MessageSquare, 
            ChevronRight, ChevronLeft, Printer, PlayCircle, Image: ImageIcon 
        } = LucideReact;

        const App = () => {
            const [slide, setSlide] = useState(1);
            const slides = [
                { id: 1, title: "Núcleo de Producción", highlight: "Integral.", subtitle: "TU ALIADO OPERATIVO B2B", porter: "El B2B existe porque las empresas necesitan profesionales que entiendan sus reglas de juego para operar sin riesgos." },
                { id: 2, tag: "Ingeniería 3D", title: "3D: Herramienta", highlight: "+ Experiencia.", subtitle: "DIFERENCIAL TÉCNICO", content: "Capacidad de respuesta industrial con acabados premium." },
                { id: 3, tag: "Prueba de Valor", title: "Producción", highlight: "de Marca.", subtitle: "BTL + EXPERIENCIAS", content: "Especialistas en transformar renders complejos en realidades tangibles." }
            ];
            const data = slides.find(s => s.id === slide);

            return (
                <div className="min-h-screen bg-black flex flex-col lg:flex-row">
                    <div className="lg:w-7/12 p-8 md:p-16 flex flex-col justify-between border-r border-white/5">
                        <header><span className="text-3xl font-black text-orange-500">nuocho</span><span className="text-3xl font-light">estudio</span></header>
                        <main className="animate-entrance py-12">
                            <span className="text-[10px] font-black tracking-widest text-orange-500 border border-orange-500/30 px-3 py-1 rounded-full uppercase">{data.subtitle}</span>
                            <h1 className="text-6xl md:text-8xl font-black uppercase leading-none mt-6">{data.title}<br/><span className="text-orange-500">{data.highlight}</span></h1>
                            <p className="text-gray-400 mt-8 text-lg max-w-md">{slide === 1 ? data.porter : data.content}</p>
                        </main>
                        <footer className="text-[10px] opacity-40 uppercase tracking-widest flex gap-8">
                            <span>311 535 92 53</span>
                            <span>direccioncreativa@nuocho.com.co</span>
                        </footer>
                    </div>
                    <div className="lg:w-5/12 bg-zinc-950 flex items-center justify-center p-12">
                        <div className="text-center">
                            <div className="w-32 h-32 border border-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <span className="text-5xl font-black text-orange-500">{slide}</span>
                            </div>
                            <p className="text-orange-500 font-bold tracking-[0.5em] text-xs uppercase">NU8 Pipeline</p>
                        </div>
                    </div>
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 flex bg-black/80 backdrop-blur-xl p-2 rounded-full border border-white/10 gap-2">
                        {[1, 2, 3].map(n => (
                            <button key={n} onClick={() => setSlide(n)} className={`w-10 h-10 rounded-full font-black text-xs transition-all ${slide === n ? 'bg-orange-500 text-black' : 'text-zinc-500'}`}>0{n}</button>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
