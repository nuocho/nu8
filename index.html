<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NU8 - Presentación B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        .animate-up { animation: slideUp 0.6s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="background:black; color:#222; height:100vh; display:flex; align-items:center; justify-content:center; font-size:10px; letter-spacing:10px;">NU8 CARGANDO...</div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(1);
            const [selectedIndex, setSelectedIndex] = useState(null);

            const RAW = "https://raw.githubusercontent.com/nuocho/nu8/main/";
            const CDN = "https://cdn.jsdelivr.net/gh/nuocho/nu8@main/";

            const slide2Medios = [
                { id: "v1", type: "video", src: CDN + "3D_ITS.mp4", label: "PROYECTO ITS", cat: "VIDEOS" },
                { id: "v2", type: "video", src: CDN + "3D_MAX.mp4", label: "PROYECTO MAX", cat: "VIDEOS" },
                { id: "r1", type: "image", src: RAW + "3d_sensodyne.jpg", label: "SENSODYNE", cat: "RENDERS" },
                { id: "r2", type: "image", src: RAW + "acabado_pieza.jpg", label: "ACABADO TÉCNICO", cat: "PRODUCCIÓN" }
            ];

            const slide3Medios = [
                { id: "b1", type: "image", src: RAW + "BTL1.JPG", label: "SOMBRILLAS", cat: "BTL" },
                { id: "b2", type: "image", src: RAW + "BTL4.PNG", label: "MARCA ARAUCO", cat: "RETAIL" },
                { id: "sm", type: "image", src: RAW + "SM_trofeos.PNG", label: "TROFEOS", cat: "MERCHANDISING" }
            ];

            const activeMedios = currentSlide === 2 ? slide2Medios : (currentSlide === 3 ? slide3Medios : []);

            const slides = {
                1: { title: "Núcleo de Producción", h: "Integral.", sub: "ALIADO OPERATIVO B2B", body: "El B2B requiere profesionales que entiendan la logística y el riesgo corporativo." },
                2: { title: "Ingeniería", h: "3D.", sub: "DIFERENCIAL TÉCNICO", body: "Modelado avanzado y manufactura de alta fidelidad para piezas que el mercado no ofrece." },
                3: { title: "Producción", h: "de Marca.", sub: "BTL + EXPERIENCIAS", body: "Ejecución técnica de activaciones. Transformamos renders complejos en realidades." },
                4: { title: "Estructura", h: "de Precios.", sub: "TRANSPARENCIA B2B", body: "Costos competitivos basados en volumen. Eliminamos sobrecostos ocultos de agencias." },
                5: { title: "¿Qué proyecto", h: "tienes hoy?", sub: "VALIDACIÓN + CIERRE", body: "Ruta de ejecución técnica en menos de 24 horas. Listos para materializar su visión." }
            };

            const data = slides[currentSlide];

            return (
                <div className="min-h-screen bg-black flex flex-col lg:grid lg:grid-cols-12 overflow-hidden">
                    {/* IZQUIERDA: TEXTOS */}
                    <div className="lg:col-span-7 p-8 md:p-16 flex flex-col justify-between border-r border-white/5 bg-zinc-950/20">
                        <header className="cursor-pointer" onClick={() => setCurrentSlide(1)}>
                            <h2 className="text-3xl font-black tracking-tighter uppercase"><span className="text-orange-500">nuocho</span>estudio</h2>
                        </header>

                        <div className="animate-up py-12">
                            <span className="text-[10px] font-black tracking-[0.4em] text-orange-500 border border-orange-500/30 px-3 py-1 rounded-full uppercase bg-orange-500/5 mb-6 inline-block">{data.sub}</span>
                            <h1 className="text-6xl md:text-8xl font-black uppercase leading-[0.85] tracking-tighter mb-8">
                                {data.title}<br/><span className="text-orange-500">{data.h}</span>
                            </h1>
                            <div className="h-1 w-24 bg-orange-500 mb-8"></div>
                            <p className="text-xl text-gray-400 leading-relaxed max-w-lg">{data.body}</p>
                        </div>

                        <footer className="pt-8 border-t border-white/5 flex flex-wrap gap-10">
                            <a href="https://wa.me/573115359253" target="_blank" className="group block">
                                <span className="text-[8px] font-black uppercase tracking-widest text-orange-500/50 block mb-1">WhatsApp Directo</span>
                                <span className="text-xs font-bold group-hover:text-white transition-colors">311 535 92 53</span>
                            </a>
                            <a href="mailto:direccioncreativa@nuocho.com.co" className="group block">
                                <span className="text-[8px] font-black uppercase tracking-widest text-orange-500/50 block mb-1">E-mail Corporativo</span>
                                <span className="text-xs font-bold group-hover:text-white transition-colors">direccioncreativa@nuocho.com.co</span>
                            </a>
                        </footer>
                    </div>

                    {/* DERECHA: GALERÍA */}
                    <div className="lg:col-span-5 bg-[#050505] border-l border-white/5 relative overflow-y-auto h-screen custom-scrollbar p-8">
                        <div className="space-y-6 pb-32">
                            {activeMedios.length > 0 ? activeMedios.map((item, idx) => (
                                <div key={item.id} onClick={() => setSelectedIndex(idx)} className="group relative aspect-video bg-black border border-white/10 rounded-xl overflow-hidden cursor-pointer hover:border-orange-500 transition-all">
                                    {item.type === 'video' ? (
                                        <div className="w-full h-full flex flex-col items-center justify-center bg-orange-500/5 group-hover:bg-orange-500/10">
                                            <svg className="w-12 h-12 text-orange-500 mb-2 opacity-60" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                            <span className="text-[10px] font-black uppercase tracking-widest">{item.label}</span>
                                        </div>
                                    ) : (
                                        <img src={item.src} className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity" />
                                    )}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80" />
                                    <div className="absolute bottom-4 left-4">
                                        <span className="text-[8px] text-orange-500 font-black uppercase tracking-widest block">{item.cat}</span>
                                        <span className="text-xs font-black uppercase tracking-widest">{item.label}</span>
                                    </div>
                                </div>
                            )) : (
                                <div className="h-full flex items-center justify-center opacity-5 pt-20 select-none">
                                    <div className="text-[15rem] font-black tracking-tighter">{currentSlide}</div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* NAVEGACIÓN */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-black/80 backdrop-blur-xl p-2 rounded-full border border-white/10 z-50">
                        {[1, 2, 3, 4, 5].map(n => (
                            <button key={n} onClick={() => setCurrentSlide(n)} className={`w-10 h-10 rounded-full font-black text-[10px] transition-all ${currentSlide === n ? 'bg-orange-500 text-black scale-110 shadow-lg' : 'text-zinc-600 hover:text-white'}`}>0{n}</button>
                        ))}
                    </div>

                    {/* MODAL / VISUALIZADOR */}
                    {selectedIndex !== null && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-4" onClick={() => setSelectedIndex(null)}>
                            <div className="relative max-w-5xl w-full bg-[#0a0a0a] border border-white/10 rounded-2xl p-4" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <span className="text-[10px] font-black uppercase tracking-widest opacity-40">{activeMedios[selectedIndex].label}</span>
                                    <button onClick={() => setSelectedIndex(null)} className="p-2 hover:bg-orange-500 hover:text-black rounded-full transition-all">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                                <div className="w-full flex items-center justify-center bg-black rounded-xl overflow-hidden min-h-[300px]">
                                    {activeMedios[selectedIndex].type === "video" ? (
                                        <video key={activeMedios[selectedIndex].src} controls autoPlay className="max-w-full max-h-[70vh]"><source src={activeMedios[selectedIndex].src} type="video/mp4" /></video>
                                    ) : (
                                        <img src={activeMedios[selectedIndex].src} className="max-w-full max-h-[70vh] object-contain" />
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
